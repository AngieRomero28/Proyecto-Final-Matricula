<!-- matriculas.html -->

<div class="page-header">
    <div>
        <h1>Matrículas</h1>
        <p>Consulta y seguimiento de matrículas registradas</p>
    </div>
</div>

<div id="registro-matriculas-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total matrículas</div>
        <div class="stat-value" id="registro-matriculas-total">0</div>
    </div>

    <div class="stat-card c-purple">
        <div class="stat-label">Créditos matriculados</div>
        <div class="stat-value" id="registro-matriculas-creditos">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Monto total</div>
        <div class="stat-value" id="registro-matriculas-monto">₡0.00</div>
    </div>

    <div class="stat-card c-yellow">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value" id="registro-matriculas-pendientes">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-registro-matriculas">Buscar</label>
                <input
                    type="text"
                    id="filtro-registro-matriculas"
                    placeholder="Matrícula, estudiante, carnet, período o factura..."
                >
            </div>

            <div class="form-group">
                <label for="filtro-registro-estado-matricula">Estado</label>
                <select id="filtro-registro-estado-matricula">
                    <option value="">Todos</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="confirmada">Confirmada</option>
                    <option value="parcial">Parcial</option>
                    <option value="cancelada">Cancelada</option>
                    <option value="anulada">Anulada</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-registro-matriculas">
                Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de matrículas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Carnet</th>
                    <th>Período</th>
                    <th>Créditos</th>
                    <th>Costo</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-registro-matriculas">
                <tr>
                    <td colspan="8">Cargando matrículas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
