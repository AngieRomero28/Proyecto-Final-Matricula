<!-- cursos.html -->

<div class="page-header">
    <div>
        <h1>Cursos</h1>
        <p>Consulta del catálogo de cursos del sistema</p>
    </div>
</div>

<div id="registro-cursos-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total cursos</div>
        <div class="stat-value" id="registro-cursos-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Cursos activos</div>
        <div class="stat-value" id="registro-cursos-activos">0</div>
    </div>

    <div class="stat-card c-purple">
        <div class="stat-label">Total créditos</div>
        <div class="stat-value" id="registro-cursos-creditos">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-registro-cursos">Buscar</label>
                <input
                    type="text"
                    id="filtro-registro-cursos"
                    placeholder="Código, nombre o descripción del curso..."
                >
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-registro-cursos">
                Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de cursos</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Curso</th>
                    <th>Créditos</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-registro-cursos">
                <tr>
                    <td colspan="6">Cargando cursos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
