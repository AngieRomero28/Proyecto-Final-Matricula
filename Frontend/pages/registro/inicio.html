<!-- inicio.html -->

<div class="page-header">
    <div>
        <h1>Inicio</h1>
        <p>Resumen general del módulo de registro</p>
    </div>
</div>

<div id="registro-inicio-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total estudiantes</div>
        <div class="stat-value" id="registro-total-estudiantes">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Estudiantes activos</div>
        <div class="stat-value" id="registro-estudiantes-activos">0</div>
    </div>

    <div class="stat-card c-purple">
        <div class="stat-label">Total cursos</div>
        <div class="stat-value" id="registro-total-cursos">0</div>
    </div>
</div>

<div class="stats-row">
    <div class="stat-card c-orange">
        <div class="stat-label">Períodos activos</div>
        <div class="stat-value" id="registro-total-periodos-activos">0</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Total matrículas</div>
        <div class="stat-value" id="registro-total-matriculas">0</div>
    </div>

    <div class="stat-card c-yellow">
        <div class="stat-label">Matrículas pendientes</div>
        <div class="stat-value" id="registro-matriculas-pendientes">0</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Matrículas recientes</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Matrícula</th>
                    <th>Estudiante</th>
                    <th>Carnet</th>
                    <th>Período</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-registro-movimientos">
                <tr>
                    <td colspan="6">Cargando información...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
