<!-- estudiantes.html -->

<div class="page-header">
    <div>
        <h1>Estudiantes</h1>
        <p>Consulta general de estudiantes registrados</p>
    </div>
</div>

<div id="registro-estudiantes-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total estudiantes</div>
        <div class="stat-value" id="registro-estudiantes-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Activos</div>
        <div class="stat-value" id="registro-estudiantes-activos">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-registro-estudiantes">Buscar</label>
                <input
                    type="text"
                    id="filtro-registro-estudiantes"
                    placeholder="Carnet, nombre, correo o identificación..."
                >
            </div>

            <div class="form-group">
                <label for="filtro-registro-estado-estudiante">Estado</label>
                <select id="filtro-registro-estado-estudiante">
                    <option value="">Todos</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                    <option value="suspendido">Suspendido</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-registro-estudiantes">
                Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de estudiantes</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Carnet</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Programa</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-registro-estudiantes">
                <tr>
                    <td colspan="7">Cargando estudiantes...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
