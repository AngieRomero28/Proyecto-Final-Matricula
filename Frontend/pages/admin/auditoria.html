<div class="page-header">
    <div>
        <h1>Auditoría</h1>
        <p>Consulta de eventos y acciones registradas en el sistema</p>
    </div>
</div>

<div id="admin-auditoria-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row-3">
            <div class="form-group">
                <label for="filtro-admin-usuario">Usuario</label>
                <input type="text" id="filtro-admin-usuario" placeholder="Buscar por usuario...">
            </div>

            <div class="form-group">
                <label for="filtro-admin-accion">Acción</label>
                <input type="text" id="filtro-admin-accion" placeholder="Buscar por acción...">
            </div>

            <div class="form-group">
                <label for="filtro-admin-fecha">Fecha</label>
                <input type="date" id="filtro-admin-fecha">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-auditoria">Filtrar</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Registro de auditoría</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-auditoria">
                <tr>
                    <td colspan="5">Cargando auditoría...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
