<div class="page-header">
    <div>
        <h1>Matrículas</h1>
        <p>Gestión y consulta general de matrículas registradas</p>
    </div>
</div>

<div id="admin-matriculas-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total matrículas</div>
        <div class="stat-value" id="admin-matriculas-total">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Créditos registrados</div>
        <div class="stat-value" id="admin-matriculas-creditos">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Monto total</div>
        <div class="stat-value" id="admin-matriculas-monto">₡0.00</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value" id="admin-matriculas-pendientes">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-admin-matriculas">Buscar</label>
                <input type="text" id="filtro-admin-matriculas" placeholder="ID, estudiante, carnet, período o factura...">
            </div>

            <div class="form-group">
                <label for="filtro-admin-estado-matricula">Estado</label>
                <select id="filtro-admin-estado-matricula">
                    <option value="">Todos</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="confirmada">Confirmada</option>
                    <option value="cancelada">Cancelada</option>
                    <option value="anulada">Anulada</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-matriculas">Filtrar</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de matrículas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Carnet</th>
                    <th>Período</th>
                    <th>Créditos</th>
                    <th>Monto</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-matriculas">
                <tr>
                    <td colspan="8">Cargando matrículas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
