<div class="page-header">
    <div>
        <h1>Pagos</h1>
        <p>Consulta de pagos realizados en el sistema</p>
    </div>
</div>

<div id="admin-pagos-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-admin-pagos">Buscar</label>
                <input type="text" id="filtro-admin-pagos" placeholder="Factura, estudiante, método...">
            </div>

            <div class="form-group">
                <label for="filtro-admin-estado-pago">Estado</label>
                <select id="filtro-admin-estado-pago">
                    <option value="">Todos</option>
                    <option value="pagado">Pagado</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="rechazado">Rechazado</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-pagos">Filtrar</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de pagos</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Factura</th>
                    <th>Estudiante</th>
                    <th>Fecha</th>
                    <th>Monto</th>
                    <th>Método</th>
                    <th>Referencia</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-pagos">
                <tr>
                    <td colspan="8">Cargando pagos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
