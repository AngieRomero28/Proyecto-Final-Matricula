<div class="page-header">
    <div>
        <h1>Programas académicos</h1>
        <p>Consulta de programas disponibles</p>
    </div>

    <div class="page-actions">
        <button class="btn btn-outline" id="btn-admin-nuevo-programa">Nuevo</button>
    </div>
</div>

<div id="admin-programas-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total programas</div>
        <div class="stat-value" id="admin-programas-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Estudiantes</div>
        <div class="stat-value" id="admin-programas-estudiantes">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Promedio</div>
        <div class="stat-value" id="admin-programas-promedio">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Buscar</h3>
    </div>

    <div class="card-body">
        <input type="text" id="filtro-admin-programa-buscar" placeholder="Buscar por nombre o código...">

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-programas">Filtrar</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de programas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Estudiantes</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-programas">
                <tr>
                    <td colspan="5">Cargando programas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
