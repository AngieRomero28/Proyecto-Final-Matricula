<!-- frontend/views/admin/usuarios.html -->
<div class="page-header">
    <div>
        <h1>Usuarios</h1>
        <p>Gestión de usuarios y roles del sistema</p>
    </div>

    <div class="page-actions">
        <button class="btn btn-primary" id="btn-admin-nuevo-usuario">Nuevo</button>
    </div>
</div>

<div id="admin-usuarios-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total usuarios</div>
        <div class="stat-value" id="admin-usuarios-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Activos</div>
        <div class="stat-value" id="admin-usuarios-activos">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Estudiantes</div>
        <div class="stat-value" id="admin-usuarios-estudiantes">0</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Docentes</div>
        <div class="stat-value" id="admin-usuarios-docentes">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-admin-usuario-buscar">Buscar</label>
                <input
                    type="text"
                    id="filtro-admin-usuario-buscar"
                    placeholder="Nombre, correo, identificación..."
                >
            </div>

            <div class="form-group">
                <label for="filtro-admin-usuario-rol">Rol</label>
                <select id="filtro-admin-usuario-rol">
                    <option value="">Todos</option>
                    <option value="admin">Admin</option>
                    <option value="registro">Registro</option>
                    <option value="tesoreria">Tesorería</option>
                    <option value="docente">Docente</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="auditor">Auditor</option>
                </select>
            </div>

            <div class="form-group">
                <label for="filtro-admin-usuario-estado">Estado</label>
                <select id="filtro-admin-usuario-estado">
                    <option value="">Todos</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-usuarios">Filtrar</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de usuarios</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-usuarios">
                <tr>
                    <td colspan="6">Cargando usuarios...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
