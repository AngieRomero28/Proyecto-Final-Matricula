<!-- frontend/views/admin/periodos.html -->

<div class="page-header">
    <div>
        <h1>Períodos</h1>
        <p>Gestión de períodos académicos y ventanas de matrícula</p>
    </div>

    <div class="page-actions">
        <button class="btn btn-primary" id="btn-admin-nuevo-periodo">
            Nuevo período
        </button>
    </div>
</div>

<div id="admin-periodos-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total períodos</div>
        <div class="stat-value" id="admin-periodos-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Períodos activos</div>
        <div class="stat-value" id="admin-periodos-activos">0</div>
    </div>

    <div class="stat-card c-orange">
        <div class="stat-label">Matrícula abierta</div>
        <div class="stat-value" id="admin-periodos-matricula-abierta">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="filtro-admin-periodos">Buscar</label>
                <input
                    type="text"
                    id="filtro-admin-periodos"
                    placeholder="Nombre, tipo, año o ID del período..."
                >
            </div>

            <div class="form-group">
                <label for="filtro-admin-estado-periodo">Estado</label>
                <select id="filtro-admin-estado-periodo">
                    <option value="">Todos</option>
                    <option value="activo">Activo</option>
                    <option value="planeado">Planeado</option>
                    <option value="finalizado">Finalizado</option>
                    <option value="cerrado">Cerrado</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" id="btn-filtrar-admin-periodos">
                Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de períodos</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Año</th>
                    <th>Fecha inicio</th>
                    <th>Fecha fin</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-periodos">
                <tr>
                    <td colspan="8">Cargando períodos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
