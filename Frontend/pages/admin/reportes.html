<div class="page-header">
    <div>
        <h1>Reportes</h1>
        <p>Resumen general del sistema</p>
    </div>
</div>

<div id="admin-reportes-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Estudiantes</div>
        <div class="stat-value" id="admin-reporte-total-estudiantes">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Cursos</div>
        <div class="stat-value" id="admin-reporte-total-cursos">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Matrículas</div>
        <div class="stat-value" id="admin-reporte-total-matriculas">0</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Recaudado</div>
        <div class="stat-value" id="admin-reporte-total-recaudado">₡0.00</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Matrículas por período</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Período</th>
                    <th>Tipo</th>
                    <th>Año</th>
                    <th>Total</th>
                    <th>Créditos</th>
                    <th>Monto</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-reportes-matriculas-periodo"></tbody>
        </table>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <h3>Pagos por período</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Período</th>
                    <th>Tipo</th>
                    <th>Año</th>
                    <th>Pagos</th>
                    <th>Monto</th>
                </tr>
            </thead>
            <tbody id="tabla-admin-reportes-pagos-periodo"></tbody>
        </table>
    </div>
</div>
