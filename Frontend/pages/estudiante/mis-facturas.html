<div class="page-header">
    <div>
        <h1>Facturas</h1>
        <p>Consulta de facturas generadas</p>
    </div>
</div>

<div id="facturas-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total facturas</div>
        <div class="stat-value" id="mis-facturas-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Monto total</div>
        <div class="stat-value" id="mis-facturas-monto">₡0.00</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Saldo pendiente</div>
        <div class="stat-value" id="mis-facturas-pendiente">₡0.00</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de facturas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Período</th>
                    <th>Total</th>
                    <th>Pagado</th>
                    <th>Saldo</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-mis-facturas">
                <tr>
                    <td colspan="6">Cargando facturas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
