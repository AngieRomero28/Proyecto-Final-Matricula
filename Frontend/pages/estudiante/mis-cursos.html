<div class="page-header">
    <div>
        <h1>Cursos</h1>
        <p>Consulta de cursos matriculados en el período actual</p>
    </div>
</div>

<div id="mis-cursos-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Cursos matriculados</div>
        <div class="stat-value" id="mis-cursos-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Créditos</div>
        <div class="stat-value" id="mis-cursos-creditos">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Período actual</div>
        <div class="stat-value" id="mis-cursos-periodo">—</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de cursos</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Curso</th>
                    <th>Créditos</th>
                    <th>Docente</th>
                    <th>Horario</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-mis-cursos">
                <tr>
                    <td colspan="6">Cargando cursos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
