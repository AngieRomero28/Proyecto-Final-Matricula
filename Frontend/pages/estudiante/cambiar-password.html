<div class="page-header">
    <div>
        <h1>Cambiar Contraseña</h1>
        <p>Actualiza tu contraseña de acceso</p>
    </div>
</div>

<div id="password-message"></div>

<div class="card">
    <div class="card-header">
        <h3>Actualizar contraseña</h3>
    </div>

    <div class="form-grid">
        <div>
            <label>Contraseña actual</label>
            <input type="password" id="pass-actual" placeholder="Ingrese su contraseña actual">
        </div>

        <div>
            <label>Nueva contraseña</label>
            <input type="password" id="pass-nueva" placeholder="Nueva contraseña">
        </div>

        <div>
            <label>Confirmar contraseña</label>
            <input type="password" id="pass-confirmar" placeholder="Confirmar nueva contraseña">
        </div>

        <button class="btn btn-primary" id="btn-cambiar-password">
            Actualizar contraseña
        </button>
    </div>

    <div class="mt-2 text-muted">
        La contraseña debe tener mínimo 8 caracteres, incluyendo mayúsculas, minúsculas, número y símbolo.
    </div>
</div>
