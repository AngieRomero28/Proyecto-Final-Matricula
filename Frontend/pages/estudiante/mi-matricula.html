<div class="page-header">
    <div>
        <h1>Matrícula</h1>
        <p>Cursos matriculados en el período actual</p>
    </div>
</div>

<div id="mi-matricula-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Cursos</div>
        <div class="stat-value" id="mi-matricula-cursos">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Créditos</div>
        <div class="stat-value" id="mi-matricula-creditos">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Costo total</div>
        <div class="stat-value" id="mi-matricula-costo">₡0.00</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Cursos matriculados</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Curso</th>
                    <th>Créditos</th>
                    <th>Profesor</th>
                    <th>Horario</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-mi-matricula">
                <tr>
                    <td colspan="5">Cargando matrícula...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
