<div class="page-header">
    <div>
        <h1>Matrícula (Administración)</h1>
        <p>Gestión manual de matrículas</p>
    </div>
</div>

<div id="matricula-admin-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Crear Matrícula</h3>
    </div>

    <div class="form-grid">
        <input type="number" id="matricula-estudiante" placeholder="ID Estudiante">
        <input type="number" id="matricula-periodo" placeholder="ID Período">

        <textarea id="matricula-secciones" placeholder="IDs de secciones separados por coma"></textarea>

        <button class="btn btn-primary" id="btn-crear-matricula">
            Crear Matrícula
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Matrículas Registradas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Período</th>
                    <th>Créditos</th>
                    <th>Costo</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-matriculas-admin">
                <tr>
                    <td colspan="6">Cargando matrículas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
