<div class="page-header">
    <div>
        <h1>Programas Académicos</h1>
        <p>Gestión de programas de estudio</p>
    </div>

    <button class="btn btn-primary" id="btn-nuevo-programa">
        + Nuevo Programa
    </button>
</div>

<div id="programas-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total Programas</div>
        <div class="stat-value" id="programas-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Total Estudiantes</div>
        <div class="stat-value" id="programas-estudiantes">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Promedio por Programa</div>
        <div class="stat-value" id="programas-promedio">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="filters-row">
        <input type="text" id="filtro-programa-buscar" placeholder="Buscar programa...">
        <button class="btn btn-outline" id="btn-filtrar-programas">Filtrar</button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de Programas</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Total Estudiantes</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-programas">
                <tr>
                    <td colspan="5">Cargando programas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
