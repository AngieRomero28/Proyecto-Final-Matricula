<div class="page-header">
    <div>
        <h1>Usuarios del Sistema</h1>
        <p>Gestión de accesos y roles</p>
    </div>

    <button class="btn btn-primary" id="btn-nuevo-usuario">
        + Nuevo Usuario
    </button>
</div>

<div id="usuarios-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Total Usuarios</div>
        <div class="stat-value" id="usuarios-total">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Activos</div>
        <div class="stat-value" id="usuarios-activos">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Estudiantes</div>
        <div class="stat-value" id="usuarios-estudiantes">0</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Docentes</div>
        <div class="stat-value" id="usuarios-docentes">0</div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="filters-row">
        <input type="text" id="filtro-usuario-buscar" placeholder="Buscar usuario...">

        <select id="filtro-usuario-rol">
            <option value="">Todos los roles</option>
            <option value="Estudiante">Estudiante</option>
            <option value="Docente">Docente</option>
            <option value="Administrador">Administrador</option>
        </select>

        <select id="filtro-usuario-estado">
            <option value="">Todos los estados</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <button class="btn btn-outline" id="btn-filtrar-usuarios">Filtrar</button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de Usuarios</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios">
                <tr>
                    <td colspan="6">Cargando usuarios...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
