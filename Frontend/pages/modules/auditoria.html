<div class="mb-3">
    <h2 class="section-title">Bitácora de Auditoría</h2>
    <p class="section-sub">Registro de todas las acciones críticas del sistema</p>
</div>

<div id="auditoria-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="card-body">
        <div class="form-row">
            <div class="form-group-m">
                <label class="form-label" for="filtro-usuario">Usuario</label>
                <input
                    type="text"
                    id="filtro-usuario"
                    class="form-control"
                    placeholder="Buscar por usuario..."
                >
            </div>

            <div class="form-group-m">
                <label class="form-label" for="filtro-accion">Acción</label>
                <input
                    type="text"
                    id="filtro-accion"
                    class="form-control"
                    placeholder="Buscar por acción..."
                >
            </div>

            <div class="form-group-m">
                <label class="form-label" for="filtro-fecha">Fecha</label>
                <input
                    type="date"
                    id="filtro-fecha"
                    class="form-control"
                >
            </div>
        </div>

        <div class="mt-2">
            <button class="btn btn-outline" id="btn-filtrar-auditoria">
                🔎 Filtrar
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div>
            <h3>Bitácora del Sistema</h3>
            <p>Eventos registrados en la plataforma</p>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Acción</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="tabla-auditoria">
                <tr>
                    <td colspan="5">Cargando registros...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
