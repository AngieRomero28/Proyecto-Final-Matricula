<div id="facturas-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <div>
            <h3>Resumen de facturas</h3>
            <p>Estado general de facturación</p>
        </div>
    </div>

    <div class="card-body">
        <div class="resumen-financiero">
            <div class="mini-card">
                <div class="mini-card-label">Total facturas</div>
                <div class="mini-card-value" id="facturas-total">0</div>
            </div>
            <div class="mini-card">
                <div class="mini-card-label">Monto total</div>
                <div class="mini-card-value" id="facturas-monto-total">₡0.00</div>
            </div>
            <div class="mini-card">
                <div class="mini-card-label">Saldo pendiente</div>
                <div class="mini-card-value" id="facturas-saldo-total">₡0.00</div>
            </div>
        </div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-header">
        <div>
            <h3>Filtros</h3>
            <p>Buscar y filtrar facturas</p>
        </div>
    </div>

    <div class="card-body">
        <div class="pago-form-grid">
            <div class="form-group">
                <label for="filtro-factura-buscar">Buscar</label>
                <input
                    type="text"
                    id="filtro-factura-buscar"
                    placeholder="Número, estudiante, carnet o período"
                >
            </div>

            <div class="form-group">
                <label for="filtro-factura-estado">Estado</label>
                <select id="filtro-factura-estado">
                    <option value="">Todos</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Pagada">Pagada</option>
                    <option value="Anulada">Anulada</option>
                </select>
            </div>
        </div>

        <button class="btn btn-primary" id="btn-filtrar-facturas">
            Filtrar
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div>
            <h3>Listado de facturas</h3>
            <p>Facturas generadas por matrícula</p>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Número</th>
                    <th>Estudiante</th>
                    <th>Período</th>
                    <th>Total</th>
                    <th>Pagado</th>
                    <th>Saldo</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-facturas">
                <tr>
                    <td colspan="9">Cargando facturas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
