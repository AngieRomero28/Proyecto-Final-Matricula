<div class="page-header">
    <div>
        <h1>Comprobantes</h1>
        <p>Consulta de comprobantes generados por matrícula</p>
    </div>
</div>

<div id="auditor-comprobantes-message"></div>

<div class="card mb-3">
    <div class="card-header">
        <h3>Filtros</h3>
    </div>

    <div class="filters-row">
        <input type="text" id="filtro-auditor-comprobante" placeholder="Buscar por estudiante, factura o comprobante...">

        <button class="btn btn-outline" id="btn-filtrar-auditor-comprobante">
            Filtrar
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Listado de comprobantes</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Estudiante</th>
                    <th>Factura</th>
                    <th>Fecha</th>
                    <th>Monto</th>
                </tr>
            </thead>
            <tbody id="tabla-auditor-comprobantes">
                <tr>
                    <td colspan="5">Cargando comprobantes...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
