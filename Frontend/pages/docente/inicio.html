<div class="page-header">
    <div>
        <h1>Portal del Docente</h1>
        <p>Resumen general de cursos, secciones y estudiantes</p>
    </div>
</div>

<div id="docente-inicio-message"></div>

<div class="stats-row">
    <div class="stat-card c-blue">
        <div class="stat-label">Cursos asignados</div>
        <div class="stat-value" id="docente-total-cursos">0</div>
    </div>

    <div class="stat-card c-green">
        <div class="stat-label">Secciones activas</div>
        <div class="stat-value" id="docente-total-secciones">0</div>
    </div>

    <div class="stat-card c-gold">
        <div class="stat-label">Estudiantes matriculados</div>
        <div class="stat-value" id="docente-total-estudiantes">0</div>
    </div>

    <div class="stat-card c-red">
        <div class="stat-label">Horarios registrados</div>
        <div class="stat-value" id="docente-total-horarios">0</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3>Resumen reciente</h3>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Curso</th>
                    <th>Sección</th>
                    <th>Período</th>
                    <th>Estudiantes</th>
                </tr>
            </thead>
            <tbody id="tabla-docente-resumen">
                <tr>
                    <td colspan="4">Cargando información...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
