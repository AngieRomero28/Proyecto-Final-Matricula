<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Sistema de Matrícula Universitaria</title>

    <link rel="stylesheet" href="/assets/css/variables.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .error-page {
            min-height: 100vh;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .error-card {
            width: 100%;
            max-width: 540px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            padding: 42px 34px;
            text-align: center;
        }

        .error-code {
            font-family: var(--font-title);
            font-size: 72px;
            line-height: 1;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .error-title {
            font-family: var(--font-title);
            color: var(--navy);
            font-size: 28px;
            margin-bottom: 10px;
        }

        .error-text {
            color: var(--gray-500);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <main class="error-page">
        <section class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-title">Página no encontrada</h1>
            <p class="error-text">
                La página que intentas abrir no existe o fue movida.
            </p>

            <div class="error-actions">
                <a href="/index.html" class="btn btn-primary">Ir al inicio</a>
                <button type="button" class="btn btn-outline" onclick="history.back()">Volver</button>
            </div>
        </section>
    </main>
</body>
</html>
